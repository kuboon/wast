name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Check & Test
    runs-on: ubuntu-latest
    env:
      HOME: /root
    defaults:
      run:
        shell: bash
    container:
      image: ghcr.io/kuboon/wast/wast-dev-container:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.github_token }}
    steps:
    - uses: actions/checkout@v6
    - run: mise run ci
    - run: mise x -- cargo fmt --check
