name: Publish Devcontainer Image

on:
  workflow_dispatch:
    inputs:
      publish_latest:
        description: Also update :latest to this multi-arch manifest
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/kuboon/wast/wast-dev-container

jobs:
  build:
    name: Build ${{ matrix.arch }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
            platform: linux/amd64
          - arch: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      - id: short-sha
        run: echo "SHORT_SHA=${GITHUB_SHA:0:12}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.arch }} image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: .devcontainer/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ matrix.arch }}-${{ steps.short-sha.outputs.SHORT_SHA }}
            ${{ env.IMAGE }}:${{ matrix.arch }}-latest

  manifest:
    name: Publish multi-arch manifest
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish manifest
        run: |
          set -euo pipefail
          SHORT_SHA="${GITHUB_SHA:0:12}"
          AMD64_TAG="${IMAGE}:amd64-${SHORT_SHA}"
          ARM64_TAG="${IMAGE}:arm64-${SHORT_SHA}"
          SHA_TAG="${IMAGE}:${SHORT_SHA}"

          if [[ "${{ inputs.publish_latest }}" == "true" ]]; then
            docker buildx imagetools create \
              -t "${SHA_TAG}" \
              -t "${IMAGE}:latest" \
              "${AMD64_TAG}" \
              "${ARM64_TAG}"
          else
            docker buildx imagetools create \
              -t "${SHA_TAG}" \
              "${AMD64_TAG}" \
              "${ARM64_TAG}"
          fi

      - name: Inspect published manifest
        run: |
          SHORT_SHA="${GITHUB_SHA:0:12}"
          docker buildx imagetools inspect "${IMAGE}:${SHORT_SHA}"
