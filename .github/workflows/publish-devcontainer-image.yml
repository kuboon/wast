name: Publish Devcontainer Image

on:
  workflow_dispatch:
    inputs:
      source_sha:
        description: Commit SHA used for both amd64 and arm64 image tags
        required: true
        type: string
      publish_latest:
        description: Also update :latest to this multi-arch manifest
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Build amd64 and publish multi-arch
    runs-on: ubuntu-latest
    env:
      IMAGE: ghcr.io/kuboon/wast/wast-dev-container
      SOURCE_SHA: ${{ inputs.source_sha }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.source_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ env.GITHUB_TOKEN }}

      - name: Build and push amd64 image
        uses: docker/build-push-action@v6
        with:
          context: .devcontainer
          file: .devcontainer/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE }}:amd64-${{ env.SOURCE_SHA }}
            ${{ env.IMAGE }}:amd64-latest

      - name: Verify arm64 tag exists
        run: |
          set -euo pipefail
          docker buildx imagetools inspect "${IMAGE}:arm64-${SOURCE_SHA}" >/dev/null

      - name: Publish multi-arch manifest
        run: |
          set -euo pipefail
          AMD64_TAG="${IMAGE}:amd64-${SOURCE_SHA}"
          ARM64_TAG="${IMAGE}:arm64-${SOURCE_SHA}"
          SHA_TAG="${IMAGE}:${SOURCE_SHA}"

          if [[ "${{ inputs.publish_latest }}" == "true" ]]; then
            docker buildx imagetools create \
              -t "${SHA_TAG}" \
              -t "${IMAGE}:latest" \
              "${AMD64_TAG}" \
              "${ARM64_TAG}"
          else
            docker buildx imagetools create \
              -t "${SHA_TAG}" \
              "${AMD64_TAG}" \
              "${ARM64_TAG}"
          fi

      - name: Inspect published manifest
        run: docker buildx imagetools inspect "${IMAGE}:${SOURCE_SHA}"
